<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音效管理器</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    :root { --md-primary:#1976D2; --md-primary-dark:#1565C0; --md-background:#FAFAFA; --md-surface:#FFFFFF; --md-on:#212121; --md-sub:#757575; --md-divider:#E0E0E0; --md-error:#B00020; --md-success:#4CAF50; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Roboto','Microsoft YaHei',sans-serif; background:var(--md-background); color:var(--md-on); }
    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--md-primary); color:#fff; }
    .header h1 { font-size:18px; font-weight:500; }
    .header-actions { display:flex; gap:8px; }
    .btn { display:flex; align-items:center; gap:6px; padding:8px 14px; border:none; border-radius:4px; cursor:pointer; }
    .btn.white { background:rgba(255,255,255,.2); color:#fff; }
    .btn.white:hover { background:rgba(255,255,255,.3); }
    .info-bar { padding:10px 20px; background:#E3F2FD; border-bottom:1px solid var(--md-divider); font-size:12px; color:var(--md-sub); }
    .path { color:var(--md-primary); font-family:Consolas,monospace; }
    .effect-list { padding:16px; }
    .effect-item { display:flex; align-items:center; gap:12px; border:1px solid var(--md-divider); border-radius:8px; background:var(--md-surface); padding:12px; margin-bottom:8px; }
    .effect-info { flex:1; min-width:0; }
    .effect-id-row { display:flex; align-items:center; gap:8px; }
    .effect-id { font-size:15px; font-weight:500; }
    .effect-filename { font-size:12px; color:var(--md-sub); margin-top:4px; }
    .effect-actions { display:flex; gap:8px; }
    .btn-action { width:34px; height:34px; border:none; border-radius:50%; background:transparent; cursor:pointer; color:var(--md-sub); }
    .btn-action:hover { background:#EEE; color:#333; }
    .btn-action.play:hover { background:#E8F5E9; color:var(--md-success); }
    .btn-action.delete:hover { background:#FFEBEE; color:var(--md-error); }
    .effect-id-input { display:none; width:180px; font-size:15px; padding:4px 8px; border:1px solid var(--md-primary); border-radius:4px; }
    .editing .effect-id { display:none; }
    .editing .effect-id-input { display:block; }
    .empty-state { text-align:center; padding:40px 20px; color:var(--md-sub); }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; border-radius:4px; padding:10px 18px; opacity:0; transition:opacity .2s; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>音效管理器</h1>
    <div class="header-actions">
      <button class="btn white" id="btnRefresh"><span class="material-icons">refresh</span>刷新</button>
      <button class="btn white" id="btnAddEffect"><span class="material-icons">add</span>添加音效</button>
    </div>
  </div>

  <div class="info-bar">音效文件目录：<span class="path" id="soundsPath"></span></div>
  <div class="effect-list" id="effectList"></div>
  <div class="toast" id="toast"></div>

  <script>
    class EffectsManager {
      constructor() {
        this.sounds = [];
        this.currentAudio = null;
        this.currentAudioFilename = null;
        this.currentPlayBtn = null;
        this.init();
      }

      async init() {
        if (window.electronAPI) {
          this.soundsPath = await window.electronAPI.getSoundsPath();
          document.getElementById('soundsPath').textContent = this.soundsPath;
        }
        await this.loadSounds();
        this.render();
        this.bind();
      }

      async loadSounds() {
        if (window.electronAPI) this.sounds = await window.electronAPI.listSounds();
      }

      async refreshEffects() {
        if (window.electronAPI) await window.electronAPI.loadEffects();
      }

      render() {
        const list = document.getElementById('effectList');
        if (!this.sounds.length) {
          list.innerHTML = '<div class="empty-state"><p>sounds 文件夹为空</p><p>可点击“添加音效”导入</p></div>';
          return;
        }

        list.innerHTML = this.sounds.map(sound => `
          <div class="effect-item" data-filename="${sound.filename}">
            <span class="material-icons">music_note</span>
            <div class="effect-info">
              <div class="effect-id-row">
                <span class="effect-id">${sound.name}</span>
                <input class="effect-id-input" value="${sound.name}" />
              </div>
              <div class="effect-filename">${sound.filename}</div>
            </div>
            <div class="effect-actions">
              <button class="btn-action edit" title="编辑ID"><span class="material-icons">edit</span></button>
              <button class="btn-action play" title="试听"><span class="material-icons">play_arrow</span></button>
              <button class="btn-action delete" title="删除"><span class="material-icons">delete</span></button>
            </div>
          </div>
        `).join('');
      }

      bind() {
        document.getElementById('btnRefresh').addEventListener('click', async () => {
          await this.loadSounds(); this.render(); await this.refreshEffects();
        });

        document.getElementById('btnAddEffect').addEventListener('click', async () => {
          if (!window.electronAPI) return;
          const sourcePath = await window.electronAPI.selectAudioFile();
          if (!sourcePath) return;
          const result = await window.electronAPI.importSound(sourcePath);
          if (result.success) {
            this.toast('音效已导入');
            await this.loadSounds();
            this.render();
            await this.refreshEffects();
          } else {
            this.toast('导入失败: ' + result.error);
          }
        });

        document.getElementById('effectList').addEventListener('click', async (e) => {
          const item = e.target.closest('.effect-item');
          if (!item) return;

          if (e.target.closest('.play')) {
            const filename = item.dataset.filename;
            const btn = item.querySelector('.play');
            if (this.currentAudio && this.currentAudioFilename === filename) {
              this.stopPreview();
              return;
            }
            this.stopPreview();
            this.playPreview(filename, btn);
            return;
          }

          if (e.target.closest('.delete')) {
            const filename = item.dataset.filename;
            if (!confirm(`确认删除音效文件 ${filename}？`)) return;
            const result = await window.electronAPI.deleteSound(filename);
            if (result?.success) {
              this.toast('已删除音效');
              await this.loadSounds();
              this.render();
              await this.refreshEffects();
            } else {
              this.toast('删除失败: ' + (result?.error || '未知错误'));
            }
            return;
          }

          if (e.target.closest('.edit')) {
            item.classList.add('editing');
            const input = item.querySelector('.effect-id-input');
            input.focus();

            const save = async () => {
              const newId = input.value.trim();
              if (newId && newId !== item.querySelector('.effect-id').textContent) {
                const result = await window.electronAPI.setEffectId(item.dataset.filename, newId);
                if (result.success) {
                  item.querySelector('.effect-id').textContent = newId;
                  await this.refreshEffects();
                  this.toast('ID 已更新');
                } else {
                  this.toast('更新失败');
                  input.value = item.querySelector('.effect-id').textContent;
                }
              }
              item.classList.remove('editing');
            };

            input.onblur = save;
            input.onkeydown = (ev) => { if (ev.key === 'Enter') input.blur(); };
          }
        });
      }

      playPreview(filename, btn) {
        if (!this.soundsPath) return;
        this.stopPreview();
        const audio = new Audio(this.toFileUrl(`${this.soundsPath}/${filename}`));
        audio.preload = 'auto';

        audio.onended = () => this.stopPreview();
        audio.onerror = () => { this.toast('播放失败'); this.stopPreview(); };

        this.currentAudio = audio;
        this.currentAudioFilename = filename;
        this.currentPlayBtn = btn;

        audio.play().catch(() => this.stopPreview());
        btn.querySelector('.material-icons').textContent = 'stop';
      }

      stopPreview() {
        if (this.currentAudio) {
          this.currentAudio.pause();
          this.currentAudio.currentTime = 0;
          this.currentAudio = null;
        }
        this.currentAudioFilename = null;
        if (this.currentPlayBtn) {
          this.currentPlayBtn.querySelector('.material-icons').textContent = 'play_arrow';
          this.currentPlayBtn = null;
        }
      }

      toFileUrl(filePath) { return `file:///${encodeURI(filePath.replace(/\\/g, '/'))}`; }

      toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      window.effectsManager = new EffectsManager();
    });
  </script>
</body>
</html>
