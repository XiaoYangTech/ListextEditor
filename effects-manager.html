<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音效管理器</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    :root { --primary:#1976d2; --bg:#fafafa; --surface:#fff; --line:#e0e0e0; --muted:#757575; --danger:#b00020; --market-tab:#9c27b0; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Roboto','Microsoft YaHei',sans-serif; background:var(--bg); color:#212121; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--primary); color:#fff; }
    .header h1 { font-size:18px; font-weight:500; }
    .header-actions { display:flex; gap:8px; }
    .btn { border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-size:13px; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary { background:rgba(255,255,255,.2); color:#fff; }
    .btn-primary:hover { background:rgba(255,255,255,.3); }
    .btn-market { background:var(--market-tab); color:#fff; }
    .btn-market:hover { background:#7b1fa2; }
    .btn-import { background:#4caf50; color:#fff; border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; }
    .btn-import:hover { background:#388e3c; }
    .top-panel { border-bottom:1px solid var(--line); background:var(--surface); padding:10px 16px; display:flex; gap:8px; align-items:center; }
    .tab-btn { border:1px solid transparent; border-radius:999px; padding:6px 14px; font-size:13px; cursor:pointer; background:var(--tab-bg, #e3f2fd); color:#0d47a1; }
    .tab-btn:hover { background:rgba(25,118,210,.15); }
    .tab-btn.active { background:#1976d2; color:#fff; }
    .tab-btn.market { background:#f3e5f5; color:#7b1fa2; }
    .tab-btn.market:hover { background:#e1bee7; }
    .tab-btn.market.active { background:#9c27b0; color:#fff; }
    .content { padding:12px 16px; }
    .group-card { border:1px solid var(--line); border-radius:10px; background:var(--surface); overflow:hidden; margin-bottom:12px; }
    .group-header { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--line); background:#fcfcfc; font-weight:600; }
    .item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-top:1px dashed #eee; }
    .item:first-child { border-top:none; }
    .item-info { flex:1; min-width:0; }
    .item-name { font-weight:500; }
    .item-meta { font-size:12px; color:var(--muted); }
    .icon-btn { width:32px; height:32px; border:none; border-radius:50%; background:transparent; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
    .icon-btn:hover { background:#ffebee; color:var(--danger); }
    .empty { color:var(--muted); font-size:13px; padding:24px; text-align:center; }
    .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:20px; background:#333; color:#fff; padding:10px 16px; border-radius:6px; opacity:0; transition:opacity .2s; z-index:999; }
    .toast.show { opacity:1; }
    .added-badge { color:#4caf50; font-size:12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>音效管理器</h1>
    <div class="header-actions">
      <button class="btn btn-primary" id="btnImportLocal"><span class="material-icons">upload_file</span>导入本地音效</button>
      <button class="btn btn-primary" id="btnRefresh"><span class="material-icons">refresh</span>刷新</button>
    </div>
  </div>

  <div class="top-panel">
    <button class="tab-btn active" id="tabProject">项目音效</button>
    <button class="tab-btn market" id="tabMarket">音效市场</button>
  </div>

  <div id="content" class="content"></div>
  <div id="toast" class="toast"></div>

  <script>
    class EffectsManager {
      constructor() {
        this.projectEffects = [];
        this.builtinSounds = [];
        this.view = 'project';
        this.init();
      }

      async init() {
        await this.refreshAll();
        this.bind();
      }

      async refreshAll() {
        if (window.electronAPI) {
          try { const d = await window.electronAPI.getProjectData(); this.projectEffects = d?.effects || []; } catch { this.projectEffects = []; }
          try { this.builtinSounds = await window.electronAPI.listBuiltinSounds() || []; } catch { this.builtinSounds = []; }
        }
        this.render();
      }

      async saveEffects() {
        if (window.electronAPI) await window.electronAPI.setProjectEffects(this.projectEffects);
      }

      bind() {
        document.getElementById('btnRefresh').addEventListener('click', () => this.refreshAll());
        document.getElementById('btnImportLocal').addEventListener('click', () => this.importLocal());
        document.getElementById('tabProject').addEventListener('click', () => { this.view = 'project'; this.updateTabs(); this.render(); });
        document.getElementById('tabMarket').addEventListener('click', () => { this.view = 'market'; this.updateTabs(); this.render(); });
      }

      updateTabs() {
        document.getElementById('tabProject').classList.toggle('active', this.view === 'project');
        document.getElementById('tabMarket').classList.toggle('active', this.view === 'market');
      }

      async importLocal() {
        if (!window.electronAPI?.selectAudioFile) return;
        const filePath = await window.electronAPI.selectAudioFile();
        if (!filePath) return;
        const parts = filePath.replace(/\\/g, '/').split('/');
        const filename = parts[parts.length - 1];
        const name = filename.replace(/\.[^.]+$/, '');
        if (this.projectEffects.some(e => e.id === name)) { this.toast('音效ID已存在'); return; }
        this.projectEffects.push({ id: name, source: 'local', filename, group: '用户音效', path: filePath });
        await this.saveEffects();
        this.toast('已导入本地音效');
        this.render();
      }

      render() {
        const el = document.getElementById('content');
        if (this.view === 'project') {
          this.renderList(el, this.projectEffects, false);
        } else {
          this.renderList(el, this.builtinSounds, true);
        }
      }

      renderList(el, effects, isMarket) {
        if (!effects.length) {
          el.innerHTML = `<div class="empty">${isMarket ? '暂无内置音效' : '项目中暂无音效，点击"音效市场"或"导入本地音效"'}</div>`;
          return;
        }

        const groups = {};
        for (const e of effects) {
          const g = e.group || '未分组';
          if (!groups[g]) groups[g] = [];
          groups[g].push(e);
        }

        let html = '';
        for (const [group, items] of Object.entries(groups)) {
          html += `<div class="group-card"><div class="group-header">${group} (${items.length})</div>`;
          for (const item of items) {
            if (isMarket) {
              const added = this.projectEffects.some(e => e.filename === item.filename && e.source === 'builtin');
              html += `<div class="item">
                <span class="material-icons">music_note</span>
                <div class="item-info"><div class="item-name">${item.name}</div><div class="item-meta">${item.filename}</div></div>
                ${added ? '<span class="added-badge">已添加</span>' : `<button class="btn-import" data-filename="${item.filename}" data-group="${item.group}" data-path="${item.path}">添加到项目</button>`}
              </div>`;
            } else {
              html += `<div class="item">
                <span class="material-icons">music_note</span>
                <div class="item-info"><div class="item-name">${item.id}</div><div class="item-meta">${item.filename} · ${item.source === 'builtin' ? '内置' : item.source === 'local' ? '本地' : '导入'}</div></div>
                <button class="icon-btn" title="移除" data-remove="${item.id}"><span class="material-icons">remove_circle</span></button>
              </div>`;
            }
          }
          html += '</div>';
        }
        el.innerHTML = html;

        el.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', async () => {
            this.projectEffects = this.projectEffects.filter(e => e.id !== btn.dataset.remove);
            await this.saveEffects();
            this.toast('已移除');
            this.render();
          });
        });

        el.querySelectorAll('.btn-import').forEach(btn => {
          btn.addEventListener('click', async () => {
            const name = btn.dataset.filename.replace(/\.[^.]+$/, '');
            if (this.projectEffects.some(e => e.id === name)) { this.toast('音效ID已存在'); return; }
            this.projectEffects.push({ id: name, source: 'builtin', filename: btn.dataset.filename, group: btn.dataset.group, path: btn.dataset.path });
            await this.saveEffects();
            this.toast('已添加到项目');
            this.render();
          });
        });
      }

      toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
      }
    }

    window.addEventListener('DOMContentLoaded', () => { window.effectsManager = new EffectsManager(); });
  </script>
</body>
</html>
