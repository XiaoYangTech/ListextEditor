<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音效管理器</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    :root { --md-primary:#1976D2; --md-bg:#FAFAFA; --md-surface:#FFF; --md-divider:#E0E0E0; --md-sub:#757575; --md-err:#B00020; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Roboto','Microsoft YaHei',sans-serif; background:var(--md-bg); color:#212121; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--md-primary); color:#fff; }
    .actions { display:flex; gap:8px; }
    .btn { border:none; border-radius:6px; padding:8px 12px; cursor:pointer; }
    .btn-white { background:rgba(255,255,255,.2); color:#fff; }
    .btn-white:hover { background:rgba(255,255,255,.3); }
    .bar { display:flex; gap:8px; align-items:center; padding:10px 20px; background:#E3F2FD; border-bottom:1px solid var(--md-divider); }
    .bar input, .bar select { height:32px; border:1px solid var(--md-divider); border-radius:6px; padding:0 8px; }
    .path { font-family:Consolas,monospace; color:#1565C0; font-size:12px; }
    .group-wrap { padding:12px 16px; }
    .group-card { border:1px solid var(--md-divider); border-radius:8px; background:var(--md-surface); margin-bottom:10px; }
    .group-header { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--md-divider); }
    .group-title { font-weight:600; }
    .default-badge { font-size:11px; color:#8d6e63; background:#fff8e1; border:1px solid #ffe082; border-radius:999px; padding:2px 6px; margin-left:6px; }
    .effect-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-top:1px dashed #eee; }
    .effect-item:first-child { border-top:none; }
    .effect-info { flex:1; min-width:0; }
    .effect-id-row { display:flex; align-items:center; gap:8px; }
    .effect-id-input { display:none; width:180px; padding:4px 8px; border:1px solid #90caf9; border-radius:4px; }
    .editing .effect-id { display:none; }
    .editing .effect-id-input { display:block; }
    .meta { font-size:12px; color:var(--md-sub); }
    .icon-btn { width:32px; height:32px; border:none; border-radius:50%; background:transparent; cursor:pointer; }
    .icon-btn:hover { background:#eee; }
    .icon-btn.delete:hover { background:#ffebee; color:var(--md-err); }
    .empty { color:var(--md-sub); font-size:13px; padding:14px; }
    .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:20px; background:#333; color:#fff; padding:10px 16px; border-radius:6px; opacity:0; transition:opacity .2s; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>音效管理器</h1>
    <div class="actions">
      <button class="btn btn-white" id="btnRefresh">刷新</button>
      <button class="btn btn-white" id="btnAddEffect">导入音效</button>
    </div>
  </div>

  <div class="bar">
    <select id="groupSelect"></select>
    <input id="newGroupInput" placeholder="新分组名" />
    <button class="btn" id="btnAddGroup">新增分组</button>
    <button class="btn" id="btnDeleteGroup">删除分组</button>
    <span class="path" id="soundsPath"></span>
  </div>

  <div id="groupWrap" class="group-wrap"></div>
  <div id="toast" class="toast"></div>

  <script>
    const DEFAULT_GROUPS = ['开场音乐', '常见音效', '环境音'];

    class EffectsManager {
      constructor() {
        this.sounds = [];
        this.groups = [];
        this.currentAudio = null;
        this.currentAudioFilename = null;
        this.currentPlayBtn = null;
        this.init();
      }

      async init() {
        if (window.electronAPI) {
          const paths = await window.electronAPI.getSoundsPath();
          document.getElementById('soundsPath').textContent = `默认: ${paths.builtin} | 用户: ${paths.user}`;
        }

        await this.refreshAll();
        this.bind();
      }

      async refreshAll() {
        this.groups = await window.electronAPI.listEffectGroups();
        this.sounds = await window.electronAPI.listSounds();
        this.renderGroupSelect();
        this.render();
        await window.electronAPI.loadEffects();
      }

      bind() {
        document.getElementById('btnRefresh').addEventListener('click', () => this.refreshAll());

        document.getElementById('btnAddEffect').addEventListener('click', async () => {
          const sourcePath = await window.electronAPI.selectAudioFile();
          if (!sourcePath) return;

          const g = document.getElementById('groupSelect').value || '用户音效';
          const result = await window.electronAPI.importSound(sourcePath, g);
          if (result.success) {
            this.toast('导入成功');
            await this.refreshAll();
          } else {
            this.toast('导入失败: ' + result.error);
          }
        });

        document.getElementById('btnAddGroup').addEventListener('click', async () => {
          const input = document.getElementById('newGroupInput');
          const name = input.value.trim();
          if (!name) return;
          const res = await window.electronAPI.addEffectGroup(name);
          if (res.success) {
            input.value = '';
            this.toast('分组已新增');
            await this.refreshAll();
          } else {
            this.toast('新增失败: ' + (res.error || '未知错误'));
          }
        });

        document.getElementById('btnDeleteGroup').addEventListener('click', async () => {
          const g = document.getElementById('groupSelect').value;
          if (!g) return;
          const res = await window.electronAPI.deleteEffectGroup(g);
          if (res.success) {
            this.toast('分组已删除');
            await this.refreshAll();
          } else {
            this.toast(res.error || '删除失败');
          }
        });

        document.getElementById('groupWrap').addEventListener('click', async (e) => {
          const item = e.target.closest('.effect-item');
          if (!item) return;

          if (e.target.closest('.btn-play')) {
            const key = item.dataset.key;
            const file = item.dataset.filename;
            const btn = item.querySelector('.btn-play');
            if (this.currentAudio && this.currentAudioFilename === key) {
              this.stopPreview();
              return;
            }
            this.stopPreview();
            this.playPreview(file, key, btn);
            return;
          }

          if (e.target.closest('.btn-delete')) {
            const key = item.dataset.key;
            const deletable = item.dataset.deletable === 'true';
            if (!deletable) {
              this.toast('默认自带音效不支持删除');
              return;
            }
            if (!confirm('确认删除该音效？')) return;

            const res = await window.electronAPI.deleteSound(key);
            if (res.success) {
              this.toast('删除成功');
              await this.refreshAll();
            } else {
              this.toast('删除失败: ' + (res.error || '未知错误'));
            }
            return;
          }

          if (e.target.closest('.btn-edit')) {
            item.classList.add('editing');
            const input = item.querySelector('.effect-id-input');
            input.focus();

            const save = async () => {
              const newId = input.value.trim();
              const oldId = item.querySelector('.effect-id').textContent;
              if (newId && newId !== oldId) {
                const result = await window.electronAPI.setEffectId(item.dataset.key, newId);
                if (result.success) {
                  item.querySelector('.effect-id').textContent = newId;
                  await window.electronAPI.loadEffects();
                  this.toast('ID 已更新');
                } else {
                  this.toast('更新失败');
                  input.value = oldId;
                }
              }
              item.classList.remove('editing');
            };

            input.onblur = save;
            input.onkeydown = (ev) => { if (ev.key === 'Enter') input.blur(); };
            return;
          }
        });
      }

      renderGroupSelect() {
        const select = document.getElementById('groupSelect');
        select.innerHTML = this.groups.map(g => `<option value="${g}">${g}</option>`).join('');
      }

      render() {
        const wrap = document.getElementById('groupWrap');
        if (!this.sounds.length) {
          wrap.innerHTML = '<div class="empty">暂无音效，请先导入</div>';
          return;
        }

        const grouped = {};
        for (const s of this.sounds) {
          if (!grouped[s.group]) grouped[s.group] = [];
          grouped[s.group].push(s);
        }

        const order = Array.from(new Set([...DEFAULT_GROUPS, ...Object.keys(grouped)]));
        wrap.innerHTML = order.map(group => {
          const list = grouped[group] || [];
          const isDefault = DEFAULT_GROUPS.includes(group);
          return `
            <div class="group-card">
              <div class="group-header">
                <div class="group-title">${group}${isDefault ? '<span class="default-badge">默认分组</span>' : ''}</div>
                <div style="font-size:12px;color:#757575;">${list.length} 个音效</div>
              </div>
              ${list.length ? list.map(sound => `
                <div class="effect-item" data-key="${sound.key}" data-filename="${sound.filename}" data-deletable="${sound.deletable}">
                  <span class="material-icons">music_note</span>
                  <div class="effect-info">
                    <div class="effect-id-row">
                      <span class="effect-id">${sound.displayId || sound.name}</span>
                      <input class="effect-id-input" value="${sound.displayId || sound.name}" />
                    </div>
                    <div class="meta">${sound.filename} · ${sound.source === 'builtin' ? '默认自带' : '用户导入'}</div>
                  </div>
                  <button class="icon-btn btn-edit" title="编辑ID"><span class="material-icons">edit</span></button>
                  <button class="icon-btn btn-play" title="试听"><span class="material-icons">play_arrow</span></button>
                  <button class="icon-btn btn-delete delete" title="删除"><span class="material-icons">delete</span></button>
                </div>
              `).join('') : '<div class="empty">该分组暂无音效</div>'}
            </div>
          `;
        }).join('');
      }

      playPreview(filename, key, btn) {
        const sourceObj = this.sounds.find(s => s.key === key);
        if (!sourceObj?.path) return;
        this.stopPreview();

        const audio = new Audio(this.toFileUrl(sourceObj.path));
        audio.preload = 'auto';
        audio.onended = () => this.stopPreview();
        audio.onerror = () => { this.toast('播放失败'); this.stopPreview(); };

        this.currentAudio = audio;
        this.currentAudioFilename = key;
        this.currentPlayBtn = btn;

        audio.play().catch(() => this.stopPreview());
        btn.querySelector('.material-icons').textContent = 'stop';
      }

      stopPreview() {
        if (this.currentAudio) {
          this.currentAudio.pause();
          this.currentAudio.currentTime = 0;
          this.currentAudio = null;
        }
        this.currentAudioFilename = null;
        if (this.currentPlayBtn) {
          this.currentPlayBtn.querySelector('.material-icons').textContent = 'play_arrow';
          this.currentPlayBtn = null;
        }
      }

      toFileUrl(filePath) { return `file:///${encodeURI(filePath.replace(/\\/g, '/'))}`; }

      toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1800);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      window.effectsManager = new EffectsManager();
    });
  </script>
</body>
</html>
