<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色管理器</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    :root { --md-primary:#1976D2; --md-primary-dark:#1565C0; --md-bg:#FAFAFA; --md-surface:#FFF; --md-on:#212121; --md-sub:#757575; --md-divider:#E0E0E0; --md-error:#B00020; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto','Microsoft YaHei',sans-serif; background: var(--md-bg); color: var(--md-on); }
    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--md-primary); color:#fff; }
    .header h1 { font-size:18px; font-weight:500; }
    .container { padding:16px; }
    .card { background:var(--md-surface); border:1px solid var(--md-divider); border-radius:8px; padding:16px; margin-bottom:12px; }
    .tip { background:#e3f2fd; border:1px solid #90caf9; color:#1565c0; padding:10px 12px; border-radius:6px; font-size:12px; margin-bottom:12px; }
    .tip code { background:#bbdefb; padding:2px 4px; border-radius:3px; font-family:Consolas,monospace; }
    .list-item { border:1px solid var(--md-divider); border-radius:6px; padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .meta { font-size:12px; color:var(--md-sub); margin-top:4px; }
    .actions { display:flex; gap:8px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-group label { display:block; font-size:12px; color:var(--md-sub); margin-bottom:6px; }
    .form-group input, .form-group select { width:100%; padding:10px; border:1px solid var(--md-divider); border-radius:6px; font-size:14px; }
    .full { grid-column: 1 / -1; }
    .btn { border:none; border-radius:6px; padding:8px 12px; cursor:pointer; font-size:13px; }
    .btn-primary { background:var(--md-primary); color:#fff; }
    .btn-primary:hover { background:var(--md-primary-dark); }
    .btn-ghost { background:#eee; color:#333; }
    .btn-danger { background:#ffebee; color:var(--md-error); }
    .row-end { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
    .empty { color:var(--md-sub); font-size:13px; }
    .source-tag { font-size:11px; padding:2px 6px; border-radius:999px; margin-left:8px; }
    .source-code { background:#e8f5e9; color:#2e7d32; }
    .source-ui { background:#fff3e0; color:#e65100; }
  </style>
</head>
<body>
  <div class="header">
    <h1>角色管理器</h1>
  </div>

  <div class="container">
    <div class="tip">
      角色跟随项目保存。你也可以在代码中使用 <code>&lt;role id="teacher" name="老师" voice="zh-CN-XiaoxiaoNeural"/&gt;</code> 定义角色。
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px; font-size:15px;">项目角色列表</h3>
      <div id="roleList"></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px; font-size:15px;">添加 / 编辑角色</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>角色ID</label>
          <input id="roleId" type="text" placeholder="例如 teacher" />
        </div>
        <div class="form-group">
          <label>角色名称</label>
          <input id="roleName" type="text" placeholder="例如 老师" />
        </div>
        <div class="form-group">
          <label>TTS 类型</label>
          <select id="roleType">
            <option value="edge">EdgeTTS</option>
            <option value="local">系统TTS</option>
          </select>
        </div>
        <div class="form-group full">
          <label>发音人</label>
          <select id="roleVoice"></select>
        </div>
      </div>
      <div class="row-end">
        <button id="btnClear" class="btn btn-ghost">清空</button>
        <button id="btnSave" class="btn btn-primary">保存角色</button>
      </div>
    </div>
  </div>

  <script>
    class RoleManagerPage {
      constructor() {
        this.roleList = document.getElementById('roleList');
        this.roleId = document.getElementById('roleId');
        this.roleName = document.getElementById('roleName');
        this.roleType = document.getElementById('roleType');
        this.roleVoice = document.getElementById('roleVoice');
        this.btnSave = document.getElementById('btnSave');
        this.btnClear = document.getElementById('btnClear');

        this.platform = window.electronAPI?.platform || '';
        this.disableLocalTts = this.platform === 'linux' || this.platform === 'darwin';

        this.bind();
        this.init();
      }

      bind() {
        this.roleType.addEventListener('change', async () => {
          if (this.roleType.value === 'local') {
            await this.getLocalVoices();
          }
          await this.populateVoices();
        });
        this.btnSave.addEventListener('click', () => this.saveRole());
        this.btnClear.addEventListener('click', () => this.clearForm());
      }

      async init() {
        if (this.disableLocalTts) {
          const localOption = this.roleType.querySelector('option[value="local"]');
          if (localOption) localOption.disabled = true;
          this.roleType.value = 'edge';
        }

        this.roleType.value = 'edge';
        await this.populateVoices();
        await this.renderRoles();
      }

      async getRoles() {
        if (window.electronAPI) {
          try {
            const data = await window.electronAPI.getProjectData();
            return data?.roles || [];
          } catch {
            return [];
          }
        }
        return [];
      }

      async setRoles(roles) {
        if (window.electronAPI) {
          await window.electronAPI.setProjectRoles(roles);
        }
      }

      getRolesFromCode(content) {
        const roles = [];
        const regex = /<role\s+([^>]+)\/?>/gi;
        let m;
        while ((m = regex.exec(content)) !== null) {
          const attrs = {};
          const attrRegex = /(\w+)=["']([^"']*)["']/g;
          let am;
          while ((am = attrRegex.exec(m[1])) !== null) {
            attrs[am[1]] = am[2];
          }
          if (attrs.id) {
            roles.push({
              id: attrs.id,
              name: attrs.name || attrs.id,
              type: attrs.type || 'edge',
              voice: attrs.voice || '',
              source: 'code'
            });
          }
        }
        return roles;
      }

      async getLocalVoices() {
        if (!('speechSynthesis' in window)) return [];
        try { speechSynthesis.getVoices(); } catch {}
        return await new Promise(resolve => {
          let done = false;
          const finish = (voices) => {
            if (done) return;
            done = true;
            resolve(Array.from(voices || []));
          };
          const immediate = speechSynthesis.getVoices();
          if (immediate.length) { finish(immediate); return; }
          speechSynthesis.onvoiceschanged = () => finish(speechSynthesis.getVoices());
          setTimeout(() => finish(speechSynthesis.getVoices()), 3000);
        });
      }

      async populateVoices() {
        const type = this.roleType.value;
        this.roleVoice.innerHTML = '<option value="">加载中...</option>';

        if (type === 'local' && this.disableLocalTts) {
          this.roleVoice.innerHTML = '<option value="">当前平台禁用系统TTS</option>';
          return;
        }

        if (type === 'edge' && window.electronAPI?.listEdgeVoices) {
          const res = await window.electronAPI.listEdgeVoices();
          const voices = res?.voices || [];
          this.roleVoice.innerHTML = voices.length
            ? voices.map(v => `<option value="${v}">${v}</option>`).join('')
            : '<option value="">未获取到 EdgeTTS 发音人</option>';
          return;
        }

        const voices = await this.getLocalVoices();
        this.roleVoice.innerHTML = voices.length
          ? voices.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('')
          : '<option value="">未获取到本地发音人</option>';
      }

      async renderRoles() {
        const uiRoles = (await this.getRoles()).filter(r => r.source !== 'code');

        let codeContent = '';
        try {
          const data = await window.electronAPI.getProjectData();
          codeContent = data?.content || '';
        } catch {}
        const codeRoles = this.getRolesFromCode(codeContent);

        if (!uiRoles.length && !codeRoles.length) {
          this.roleList.innerHTML = '<div class="empty">尚未添加角色。可通过此界面添加，或在代码中使用 &lt;role&gt; 标签定义。</div>';
          return;
        }

        let html = '';

        if (codeRoles.length) {
          html += '<div style="margin-bottom:8px;font-size:12px;color:#757575;">代码中定义的角色（只读）</div>';
          html += codeRoles.map(role => `
            <div class="list-item" data-id="${role.id}">
              <div>
                <div><strong>${role.name}</strong> (${role.id})<span class="source-tag source-code">代码定义</span></div>
                <div class="meta">EdgeTTS · ${role.voice || '未设置'}</div>
              </div>
            </div>
          `).join('');
        }

        if (uiRoles.length) {
          if (codeRoles.length) html += '<div style="margin:12px 0 8px;font-size:12px;color:#757575;">手动添加的角色</div>';
          html += uiRoles.map(role => `
            <div class="list-item" data-id="${role.id}">
              <div>
                <div><strong>${role.name}</strong> (${role.id})<span class="source-tag source-ui">手动添加</span></div>
                <div class="meta">${role.type === 'edge' ? 'EdgeTTS' : '系统TTS'} · ${role.voice || '未设置'}</div>
              </div>
              <div class="actions">
                <button class="btn btn-ghost" data-action="edit" data-id="${role.id}">编辑</button>
                <button class="btn btn-danger" data-action="delete" data-id="${role.id}">删除</button>
              </div>
            </div>
          `).join('');
        }

        this.roleList.innerHTML = html;

        this.roleList.querySelectorAll('button[data-action="edit"]').forEach(btn => btn.addEventListener('click', async () => await this.editRole(btn.dataset.id)));
        this.roleList.querySelectorAll('button[data-action="delete"]').forEach(btn => btn.addEventListener('click', async () => await this.deleteRole(btn.dataset.id)));
      }

      async editRole(id) {
        const roles = await this.getRoles();
        const role = roles.find(r => r.id === id);
        if (!role) return;

        this.roleId.value = role.id;
        this.roleName.value = role.name || '';
        this.roleType.value = role.type || 'edge';

        if (this.disableLocalTts && this.roleType.value === 'local') {
          this.roleType.value = 'edge';
        }

        await this.populateVoices();
        this.roleVoice.value = role.voice || '';
      }

      async deleteRole(id) {
        const roles = (await this.getRoles()).filter(r => r.id !== id);
        await this.setRoles(roles);
        await this.renderRoles();
      }

      async clearForm() {
        this.roleId.value = '';
        this.roleName.value = '';
        this.roleType.value = 'edge';
        await this.populateVoices();
        this.roleVoice.value = '';
      }

      async saveRole() {
        const id = this.roleId.value.trim();
        const name = this.roleName.value.trim();
        const type = this.roleType.value;
        const voice = this.roleVoice.value.trim();

        if (!id || !name) {
          alert('请填写角色ID和角色名称');
          return;
        }

        if (type === 'local' && this.disableLocalTts) {
          alert('当前平台禁用系统TTS，请改为 EdgeTTS');
          return;
        }

        const roles = await this.getRoles();
        const payload = { id, name, type, voice, source: 'ui' };
        const idx = roles.findIndex(r => r.id === id && r.source !== 'code');
        if (idx >= 0) roles[idx] = payload;
        else roles.push(payload);

        await this.setRoles(roles);
        await this.renderRoles();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      window.roleManagerPage = new RoleManagerPage();
    });
  </script>
</body>
</html>
