name: Build and Release

on:
  push:
    tags:
      - 'v*'   # 仅当推送以 v 开头的 tag 时触发，例如 v1.0.0

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build:win:x64
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/*.exe --clobber
      - name: Upload to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          for file in dist/*.exe; do
            curl -X POST \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -F "file=@$file" \
              https://api.cnb.cool/${{ github.repository }}/releases/${{ github.ref_name }}/attachments
          done

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64, loong64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Setup cross-compile for loong64
        if: matrix.arch == 'loong64'
        uses: maikebing/loongarch64-cross-compile@main
      - name: Install ARM64 tools (if needed)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Install fpm (for .deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm
      - name: Build for loong64 (special)
        if: matrix.arch == 'loong64'
        run: |
          npm config set registry https://registry.loongnix.cn:5873
          ELECTRON_MIRROR="https://github.com/darkyzhou/electron-loong64/releases/download/" \
          electron_use_remote_checksums=1 npm install electron@43.0.0 --save-dev --force
          npm run build:linux:loong64
      - name: Build for other Linux arches
        if: matrix.arch != 'loong64'
        run: npm run build:linux:${{ matrix.arch }}
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in dist/*.AppImage dist/*.deb; do
            [ -f "$file" ] && gh release upload ${{ github.ref_name }} "$file" --clobber
          done
      - name: Upload to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          for file in dist/*.AppImage dist/*.deb; do
            [ -f "$file" ] && curl -X POST \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -F "file=@$file" \
              https://api.cnb.cool/${{ github.repository }}/releases/${{ github.ref_name }}/attachments
          done

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build:mac
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/*.dmg --clobber
      - name: Upload to CNB Release
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          for file in dist/*.dmg; do
            curl -X POST \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -F "file=@$file" \
              https://api.cnb.cool/${{ github.repository }}/releases/${{ github.ref_name }}/attachments
          done
