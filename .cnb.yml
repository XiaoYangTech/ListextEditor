main:
  push:
    - name: sync-to-github
      imports: https://cnb.cool/InspireWorks/tokens/-/blob/main/github.yml
      stages:
        - name: sync
          jobs:
            - name: sync-to-github
              image: tencentcom/git-sync
              settings:
                target_url: https://github.com/XiaoYangTech/ListextEditor.git
                auth_type: https
                username: ${GITHUB_USERNAME}
                password: ${GITHUB_TOKEN}
                push_tags: true

master:
  push:
    - name: sync-to-github
      imports: .cnb/secrets/github.yml
      stages:
        - name: sync
          jobs:
            - name: sync-to-github
              image: tencentcom/git-sync
              settings:
                target_url: https://github.com/XiaoYangTech/ListextEditor.git
                auth_type: https
                username: ${GITHUB_USERNAME}
                password: ${GITHUB_TOKEN}
                push_tags: true
